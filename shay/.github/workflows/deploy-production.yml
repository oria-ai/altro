name: Deploy to Vercel (production)

# Auto-deploys shaym.beauty on every push to the `production` branch.
# Requires one repo secret: VERCEL_TOKEN  (a Vercel token scoped to the
# team that owns the `shay` project — team_WE0BMr5Lro0VezVlO1K1UbmK,
# oria-ais-projects; the old aurelius team is deploy-blocked).
# Org/project IDs below are not secrets — they identify the linked project.

on:
  push:
    branches: [production]
  workflow_dispatch: {}

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_WE0BMr5Lro0VezVlO1K1UbmK
      VERCEL_PROJECT_ID: prj_EpjPospMLFjy1G1qRkr7K7nDsPKa
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
