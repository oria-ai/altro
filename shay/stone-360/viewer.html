<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stone 360 POC — prompt your room, orbit the stone</title>
<style>
  html,body{margin:0;height:100%;background:#0d0d0f;overflow:hidden;font-family:system-ui,sans-serif}
  #c{display:block;width:100vw;height:100vh}
  .panel{position:fixed;color:#fff;background:rgba(16,16,20,.62);backdrop-filter:blur(8px);
         border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
  #prompt-panel{left:16px;top:16px;width:330px}
  #prompt-panel h1{font-size:14px;margin:0 0 8px;font-weight:600;letter-spacing:.2px}
  #prompt-panel .sub{font-size:11px;color:#9aa;margin:-4px 0 10px}
  textarea{width:100%;box-sizing:border-box;height:60px;resize:vertical;border-radius:8px;
           border:1px solid #333;background:#0c0c0e;color:#eee;font:13px system-ui;padding:8px}
  .row{display:flex;gap:8px;margin-top:8px;align-items:center}
  button{flex:0 0 auto;background:#ffd479;color:#1a1a1a;border:0;border-radius:8px;
         padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
  button:disabled{opacity:.5;cursor:wait}
  #status{font-size:12px;color:#9fd;min-height:16px}
  .lbl{font-size:11px;color:#9aa;margin:11px 0 5px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11px;color:#cfd;background:#23232a;border:1px solid #333;border-radius:14px;
        padding:3px 9px;cursor:pointer}
  .chip:hover{background:#2e2e38}
  .chip.on{background:#ffd479;color:#1a1a1a;border-color:#ffd479}
  #hud{right:16px;bottom:16px;font-size:12px;color:#cdd;text-align:right;line-height:1.5}
  #hud b{color:#ffd479}
  #err{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);color:#ff9a9a;font-size:14px;text-align:center;display:none}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid #9fd;border-top-color:transparent;border-radius:50%;animation:s .8s linear infinite;vertical-align:-1px;margin-right:5px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="prompt-panel" class="panel">
  <h1>Build your room</h1>
  <div class="sub">type a room → flux-360 wraps a 360° panorama around the stone</div>
  <textarea id="prompt" placeholder="a warm Scandinavian living room, oak floor, big windows, plants...">a warm Scandinavian living room with light oak floor, large windows, linen sofa, potted plants, soft afternoon light</textarea>
  <div class="row">
    <button id="go">Generate room</button>
    <span id="status">ready</span>
  </div>
  <div class="lbl">presets</div>
  <div class="chips" id="presets"></div>
  <div class="lbl">stone</div>
  <div class="chips" id="stones"></div>
</div>

<div id="hud" class="panel">
  <b id="stone-name">Striped Sentinel</b> · <span id="stone-dim"></span><br>
  drag to orbit · scroll to zoom
</div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "./vendor/three.module.js",
  "three/addons/": "./vendor/addons/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const STONES = {
  boulder: { name: 'Striped Sentinel', glb: 'out/stone-boulder.glb', w: 85, h: 62, d: 55 },
  flint:   { name: 'Banded Flint',     glb: 'out/stone-flint.glb',   w: 14, h: 9,  d: 7  },
};
let current = 'boulder';

const Q = new URLSearchParams(location.search);
const AZ = Q.has('az') ? +Q.get('az') * Math.PI/180 : null;
if (Q.has('stone')) current = Q.get('stone');
if (Q.has('bare')) { document.getElementById('prompt-panel').style.display='none'; document.getElementById('hud').style.display='none'; }

const errEl = document.getElementById('err');
const fail = (m) => { errEl.style.display='block'; errEl.innerHTML = m; console.error(m); };

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.NoToneMapping;     // OutputPass applies ACES at the end of the chain
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.01, 100);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 0.35; controls.maxDistance = 7;
controls.maxPolarAngle = Math.PI * 0.52;
controls.autoRotate = (AZ === null);
controls.autoRotateSpeed = 0.55;
let idleT;
controls.addEventListener('start', () => { controls.autoRotate = false; clearTimeout(idleT); });
controls.addEventListener('end', () => { if (AZ === null) idleT = setTimeout(() => controls.autoRotate = true, 3500); });

// ---- lighting: the ROOM lights the stone (IBL). One soft sun only for a gentle shadow. ----
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.18));
const sun = new THREE.DirectionalLight(0xfff2e0, 0.45);  // warm, low — just to drop a soft shadow
sun.position.set(2.2, 5.0, 1.6); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048); sun.shadow.radius = 9; sun.shadow.blurSamples = 18;
Object.assign(sun.shadow.camera, { left:-2, right:2, top:2, bottom:-2, near:0.1, far:16 });
sun.shadow.bias = -0.0004; scene.add(sun);

// ---- soft contact-shadow decal (radial gradient) — guarantees grounding under any light ----
function contactTex() {
  const s = 256, cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d').createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(0,0,0,0.42)'); g.addColorStop(0.5,'rgba(0,0,0,0.20)'); g.addColorStop(1,'rgba(0,0,0,0)');
  const ctx = cv.getContext('2d'); ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
  const t = new THREE.CanvasTexture(cv); t.colorSpace = THREE.SRGBColorSpace; return t;
}
const CONTACT = contactTex();
function contactDecal(w, d, y) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({ map: CONTACT, transparent:true, depthWrite:false, opacity:0.9 }));
  m.position.y = y; m.renderOrder = 1; m.name = 'decal'; return m;
}

// ---- procedural plinth material (warm plaster + subtle mottle + bottom AO) ----
function plinthMat() {
  const s = 512, cv = document.createElement('canvas'); cv.width = cv.height = s; const x = cv.getContext('2d');
  x.fillStyle = '#e7e0d4'; x.fillRect(0,0,s,s);
  for (let i=0;i<14000;i++){ const a=Math.random()*0.11; x.fillStyle=`rgba(${120+Math.random()*90|0},${110+Math.random()*85|0},${95+Math.random()*80|0},${a})`;
    x.fillRect(Math.random()*s, Math.random()*s, 1+Math.random()*3, 1+Math.random()*3); }
  // faint vertical veining for a worked-stone/plaster read
  for (let i=0;i<28;i++){ x.strokeStyle=`rgba(140,130,118,${0.04+Math.random()*0.05})`; x.lineWidth=1+Math.random()*2;
    x.beginPath(); const vx=Math.random()*s; x.moveTo(vx,0); x.bezierCurveTo(vx+20-Math.random()*40,s*0.4,vx+20-Math.random()*40,s*0.7,vx+10-Math.random()*20,s); x.stroke(); }
  const grad = x.createLinearGradient(0,0,0,s); grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(1,'rgba(0,0,0,0.10)');
  x.fillStyle = grad; x.fillRect(0,0,s,s);
  const map = new THREE.CanvasTexture(cv); map.colorSpace = THREE.SRGBColorSpace; map.anisotropy = 4;
  return new THREE.MeshStandardMaterial({ map, roughness: 0.62, metalness: 0.0, envMapIntensity: 0.7 });
}

// ---- real floor: reflects the room, color-matched, fades into the panorama so the
//      stand rests on continuous ground (the biggest "embedded" cue). ----
function floorAlpha() {
  const s = 256, cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d').createRadialGradient(s/2,s/2,s*0.10,s/2,s/2,s/2);
  g.addColorStop(0,'#fff'); g.addColorStop(0.55,'#bbb'); g.addColorStop(1,'#000');
  const x = cv.getContext('2d'); x.fillStyle = g; x.fillRect(0,0,s,s);
  return new THREE.CanvasTexture(cv);
}
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(6, 96).rotateX(-Math.PI/2),
  new THREE.MeshStandardMaterial({ color: 0xb49a78, roughness: 0.30, metalness: 0.0,
    envMapIntensity: 1.0, transparent: true, alphaMap: floorAlpha() })
);
floor.receiveShadow = true; floor.position.y = 0; scene.add(floor);

// sample the room's own floor colour (lower-centre of the panorama) so our floor matches
function matchFloor(image) {
  const w = 64, h = 32, cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  const x = cv.getContext('2d'); x.drawImage(image, 0, 0, w, h);
  const d = x.getImageData(Math.floor(w*0.35), Math.floor(h*0.72), Math.floor(w*0.3), Math.floor(h*0.2)).data;
  let r=0,g=0,b=0,n=0; for (let i=0;i<d.length;i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
  floor.material.color.setRGB((r/n/255)**2.2, (g/n/255)**2.2, (b/n/255)**2.2);
}

// ---- 360 room (swappable) ----
let skyMat = null;
const pmrem = new THREE.PMREMGenerator(renderer);
function loadRoom(url) {
  new THREE.TextureLoader().load(url, (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace; tex.mapping = THREE.EquirectangularReflectionMapping;
    if (!skyMat) { skyMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide });
      scene.add(new THREE.Mesh(new THREE.SphereGeometry(20, 64, 32), skyMat)); }
    else { skyMat.map?.dispose(); skyMat.map = tex; skyMat.needsUpdate = true; }
    scene.environment = pmrem.fromEquirectangular(tex).texture;   // <-- room lights the stone
    if (tex.image) { matchSun(tex.image); matchFloor(tex.image); } // aim sun + match floor colour to the room
  }, undefined, () => fail('Could not load room — generate one first.'));
}

// find the room's brightest direction and put the key light there -> stone self-shadows
// consistently with the visible windows/sun (kills the "pasted-on" lighting mismatch).
function matchSun(image) {
  const w = 160, h = 80, cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  const x = cv.getContext('2d'); x.drawImage(image, 0, 0, w, h);
  const d = x.getImageData(0, 0, w, h).data;
  let bi = 0, bv = -1;
  for (let i = 0; i < w*h; i++) {
    const lum = 0.299*d[i*4] + 0.587*d[i*4+1] + 0.114*d[i*4+2];
    const row = (i / w) | 0;
    const weight = lum * (1 - 0.45 * (row / h));      // prefer light from above
    if (weight > bv) { bv = weight; bi = i; }
  }
  const u = (bi % w) / w, v = ((bi / w) | 0) / h;
  const lon = u * 2 * Math.PI, lat = (0.5 - v) * Math.PI;
  const dir = new THREE.Vector3(Math.cos(lat)*Math.sin(lon), Math.sin(lat), Math.cos(lat)*Math.cos(lon));
  dir.y = Math.max(dir.y, 0.55); dir.normalize();
  sun.position.copy(dir.multiplyScalar(6));
  sun.color.set(0xfff1df); sun.intensity = 0.4;   // gentle — soft rooms want soft shadows
  sun.shadow.radius = 14;
}

// ---- stone + adaptive plinth + grounding ----
const loader = new GLTFLoader();
let group = null, reflGroup = null;
function loadStone(id) {
  const s = STONES[id]; if (!s) return; current = id;
  document.getElementById('stone-name').textContent = s.name;
  document.getElementById('stone-dim').textContent = `${s.w}×${s.h}×${s.d} cm`;
  document.querySelectorAll('#stones .chip').forEach(c => c.classList.toggle('on', c.dataset.id === id));

  const sh = s.h/100, sw = s.w/100, sd = s.d/100;
  const pedH = Math.min(0.95, Math.max(0.30, 0.92 - sh/2));
  const pedW = Math.max(0.22, sw * 1.35), pedD = Math.max(0.22, sd * 1.35);
  const top = pedH + sh/2;

  if (group) scene.remove(group);
  if (reflGroup) scene.remove(reflGroup);
  group = new THREE.Group();

  const ped = new THREE.Mesh(new RoundedBoxGeometry(pedW, pedH, pedD, 5, 0.018), plinthMat());
  ped.position.set(0, pedH/2, 0); ped.castShadow = true; ped.receiveShadow = true; group.add(ped);
  group.add(contactDecal(pedW*1.7, pedD*1.7, 0.004));              // pedestal grounded to floor

  loader.load(s.glb, (gltf) => {
    const st = gltf.scene;
    let box = new THREE.Box3().setFromObject(st); const sz = new THREE.Vector3(); box.getSize(sz);
    st.scale.setScalar(sh / sz.y);
    box = new THREE.Box3().setFromObject(st); const c = new THREE.Vector3(); box.getCenter(c);
    st.position.x -= c.x; st.position.z -= c.z; st.position.y -= box.min.y; st.position.y += pedH;
    st.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true;
      if (o.material) { o.material.envMapIntensity = 1.0; } } });
    group.add(st);
    group.add(contactDecal(sw*1.5, sd*1.5, pedH + 0.004));         // stone grounded to pedestal

    // faded mirror reflection in the floor -> the stand reads as standing IN the room
    reflGroup = group.clone(true);
    reflGroup.scale.set(1, -1, 1);
    reflGroup.traverse(o => {
      if (!o.isMesh) return;
      if (o.name === 'decal') { o.visible = false; return; }
      o.castShadow = false; o.receiveShadow = false;
      o.material = o.material.clone();
      o.material.transparent = true; o.material.opacity = 0.16;
      o.material.depthWrite = false; o.material.side = THREE.DoubleSide;
      o.renderOrder = -2;
    });
    scene.add(reflGroup);
  }, undefined, () => fail(`Could not load <b>${s.glb}</b>.`));

  scene.add(group);
  const rad = Math.max(2.1, sw * 2.7 + 1.25);                      // further back
  controls.target.set(0, top, 0);
  if (AZ !== null) camera.position.set(Math.sin(AZ)*rad, top + 0.30, Math.cos(AZ)*rad);
  else camera.position.set(rad*0.22, top + 0.30, rad);
  controls.update();
}

// ---- depth of field: stone in focus, room softens naturally (kills the cut-out look) ----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bokeh = new BokehPass(scene, camera, { focus: 3.0, aperture: 0.0009, maxblur: 0.006 });
composer.addPass(bokeh);
composer.addPass(new OutputPass());

loadRoom('out/room.jpg'); loadStone(current);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});
renderer.setAnimationLoop(() => {
  controls.update();
  bokeh.uniforms['focus'].value = camera.position.distanceTo(controls.target); // focus on the stone
  composer.render();
});

// ---- UI ----
const presets = [
  'a warm Scandinavian living room with light oak floor and big windows',
  'a moody industrial loft, concrete, black steel, dramatic side light',
  'a serene Japanese tatami room, shoji screens, soft daylight',
  'a luxury marble gallery, gold accents, polished floor',
  'a cozy cabin interior, timber walls, fireplace glow, evening',
];
const pc = document.getElementById('presets');
presets.forEach(p => { const el=document.createElement('span'); el.className='chip'; el.textContent=p.split(',')[0];
  el.onclick=()=>{ document.getElementById('prompt').value=p; }; pc.appendChild(el); });
const sc = document.getElementById('stones');
Object.entries(STONES).forEach(([id,s]) => { const el=document.createElement('span'); el.className='chip'; el.dataset.id=id;
  el.textContent=s.name; el.onclick=()=>loadStone(id); sc.appendChild(el); });

const promptEl = document.getElementById('prompt'), goEl = document.getElementById('go'), statusEl = document.getElementById('status');
goEl.onclick = async () => {
  const prompt = promptEl.value.trim(); if (!prompt) return;
  goEl.disabled = true; statusEl.innerHTML = '<span class="spin"></span>generating 360° room… ~15s';
  try { const r = await fetch('/api/room', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ prompt }) });
    const j = await r.json(); if (!r.ok) throw new Error(j.error || r.status);
    loadRoom(j.url); statusEl.textContent = 'done ✓ look around';
  } catch (e) { statusEl.textContent = 'failed: ' + e.message; } finally { goEl.disabled = false; }
};
</script>
</body>
</html>
