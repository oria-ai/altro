<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oria Lab — coming soon</title>
<style>
  :root {
    --c1: #22c55e; /* green  */
    --c2: #fb923c; /* orange */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #050508;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #scene {
    position: fixed;
    inset: 0;
    display: block;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    pointer-events: none;
    z-index: 2;
  }

  .wordmark {
    font-size: clamp(3rem, 10vw, 7.5rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    background: linear-gradient(120deg, #ffffff 30%, var(--c1) 60%, var(--c2) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  .tagline {
    margin-top: 1rem;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.5);
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
  }

  .meshugaim {
    margin-top: 3.5rem;
    font-size: clamp(1.4rem, 3.4vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    background: linear-gradient(120deg, var(--c1), var(--c2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
  }

  .soon {
    margin-top: 1.4rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: clamp(0.7rem, 1.4vw, 0.85rem);
    font-weight: 500;
    letter-spacing: 0.55em;
    text-indent: 0.55em; /* visually balance the tracking */
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
  }

  .soon::before,
  .soon::after {
    content: "";
    display: block;
    width: clamp(2rem, 6vw, 4rem);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35));
  }
  .soon::after {
    background: linear-gradient(90deg, rgba(255,255,255,0.35), transparent);
  }

  .pulse {
    position: fixed;
    bottom: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c2);
    box-shadow: 0 0 12px 2px var(--c2);
    animation: pulse 2.4s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: translateX(-50%) scale(0.8); }
    50%      { opacity: 1;    transform: translateX(-50%) scale(1.15); }
  }

  /* soft vignette so the text always sits on something dark */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
                rgba(5,5,8,0) 35%, rgba(5,5,8,0.75) 100%);
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="vignette"></div>

<div class="overlay">
  <h1 class="wordmark">Oria Lab</h1>
  <div class="tagline">זר לא יבין</div>
  <div class="meshugaim">meshugaim</div>
  <div class="soon">coming soon</div>
</div>
<div class="pulse"></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ---------- renderer / scene / camera ---------- */

const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050508, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.2, 7);
camera.lookAt(0, 0, 0);

/* ---------- particle wave field ---------- */

const COUNT_X = 220;
const COUNT_Z = 120;
const COUNT   = COUNT_X * COUNT_Z;
const SPREAD_X = 22;
const SPREAD_Z = 12;

const positions = new Float32Array(COUNT * 3);
const seeds     = new Float32Array(COUNT);

let i = 0;
for (let x = 0; x < COUNT_X; x++) {
  for (let z = 0; z < COUNT_Z; z++) {
    positions[i * 3 + 0] = (x / (COUNT_X - 1) - 0.5) * SPREAD_X;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = (z / (COUNT_Z - 1) - 0.5) * SPREAD_Z;
    seeds[i] = Math.random();
    i++;
  }
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('aSeed',    new THREE.BufferAttribute(seeds, 1));

const uniforms = {
  uTime:   { value: 0 },
  uColorA: { value: new THREE.Color('#22c55e') },
  uColorB: { value: new THREE.Color('#fb923c') },
  uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
};

const material = new THREE.ShaderMaterial({
  uniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    uniform float uTime;
    uniform float uPixelRatio;
    attribute float aSeed;
    varying float vMix;
    varying float vAlpha;

    /* cheap layered "noise" from sines — smooth, organic, fast */
    float wave(vec2 p, float t) {
      float v = 0.0;
      v += sin(p.x * 0.55 + t * 0.7)  * 0.55;
      v += sin(p.y * 0.80 + t * 0.55) * 0.35;
      v += sin((p.x + p.y) * 0.45 - t * 0.9) * 0.30;
      v += sin(length(p) * 0.9 - t * 1.2)     * 0.25;
      return v;
    }

    void main() {
      vec3 p = position;
      float t = uTime;

      float h = wave(p.xz, t);
      p.y += h;

      /* gentle sideways drift so the grid doesn't feel rigid */
      p.x += sin(t * 0.3 + aSeed * 6.2831) * 0.08;
      p.z += cos(t * 0.25 + aSeed * 6.2831) * 0.08;

      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;

      /* size: bigger near crests, attenuated by depth */
      float crest = smoothstep(-1.0, 1.4, h);
      gl_PointSize = (1.0 + crest * 3.0 + aSeed * 1.2) * uPixelRatio * (8.0 / -mv.z);

      vMix   = crest;
      vAlpha = 0.25 + crest * 0.65;
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    varying float vMix;
    varying float vAlpha;

    void main() {
      /* round soft particle */
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      float disc = smoothstep(0.5, 0.1, d);
      if (disc < 0.01) discard;

      vec3 color = mix(uColorA, uColorB, vMix);
      gl_FragColor = vec4(color, disc * vAlpha);
    }
  `,
});

const points = new THREE.Points(geometry, material);
scene.add(points);

/* ---------- subtle mouse / touch parallax ---------- */

const target = new THREE.Vector2(0, 0);
const eased  = new THREE.Vector2(0, 0);

function onPointer(x, y) {
  target.x = (x / window.innerWidth  - 0.5) * 2;
  target.y = (y / window.innerHeight - 0.5) * 2;
}
window.addEventListener('pointermove', (e) => onPointer(e.clientX, e.clientY));
window.addEventListener('touchmove',  (e) => {
  if (e.touches.length) onPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

/* ---------- resize ---------- */

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
});

/* ---------- loop ---------- */

const clock = new THREE.Clock();

function tick() {
  const t = clock.getElapsedTime();
  uniforms.uTime.value = t;

  /* eased parallax — camera floats around its rest position */
  eased.lerp(target, 0.04);
  camera.position.x = eased.x * 1.2;
  camera.position.y = 2.2 - eased.y * 0.7;
  camera.lookAt(0, 0, 0);

  /* very slow drift of the whole field */
  points.rotation.y = Math.sin(t * 0.05) * 0.08;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>

</body>
</html>
